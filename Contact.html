<body>
    <div class="contact-container">
        <h1>Get in Touch</h1>
        <p>I'd love to hear from you. Choose your preferred way to connect:</p>

        <div class="contact-methods">
            <a href="mailto:hello@example.com" class="contact-card">
                <div class="icon">✉️</div>
                <div class="info">
                    <span>Email Me</span>
                    <strong>hello@example.com</strong>
                </div>
            </a>

            <a href="tel:+123456789" class="contact-card">
                <div class="icon">📞</div>
                <div class="info">
                    <span>Call or Text</span>
                    <strong>+1 (234) 567-89</strong>
                </div>
            </a>

            <a href="https://linkedin.com/in/username" target="_blank" class="contact-card">
                <div class="icon">🌐</div>
                <div class="info">
                    <span>LinkedIn</span>
                    <strong>Connect on Social</strong>
                </div>
            </a>
        </div>

        <div class="availability">
            <span class="status-dot"></span> Available for new projects
        </div>
    </div>
</body>
