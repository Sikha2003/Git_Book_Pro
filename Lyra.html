<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inquiry | Lyra 2026</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <section class="inquiry-page">
        <nav class="form-nav">
            <span class="badge">LYRA / INQUIRY</span>
            <a href="index.html" class="close-btn">ESC</a>
        </nav>

        <div class="form-wrapper">
            <header class="form-intro">
                <p class="tagline">Step into the future.</p>
                <h1>What are we<br>creating today?</h1>
            </header>

            <form class="clean-form">
                <div class="form-grid">
                    <div class="field">
                        <label>Identity</label>
                        <input type="text" placeholder="Your name or company">
                    </div>
                    <div class="field">
                        <label>Mission</label>
                        <input type="email" placeholder="Preferred email address">
                    </div>
                    <div class="field full">
                        <label>The Vision</label>
                        <textarea rows="1" placeholder="Tell us about the project goal..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <p>By sending, you agree to our 2026 Privacy Protocol.</p>
                    <button type="submit" class="send-btn">
                        Commence Project 
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </form>
        </div>
    </section>

</body>
</html>
