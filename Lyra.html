<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Get Started | Project 2026</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <div class="background-blobs">
        <div class="blob color-1"></div>
        <div class="blob color-2"></div>
    </div>

    <main class="glass-container">
        <form id="step-form">
            <div class="form-step active">
                <span class="step-count">01/03</span>
                <h2>What should we call you?</h2>
                <input type="text" placeholder="Your name" required>
                <button type="button" class="btn-next">Continue</button>
            </div>

            <div class="form-step">
                <span class="step-count">02/03</span>
                <h2>What are you building?</h2>
                <select>
                    <option>Mobile App</option>
                    <option>Web Experience</option>
                    <option>Brand Identity</option>
                </select>
                <button type="button" class="btn-next">Almost there</button>
            </div>

            <div class="form-step">
                <span class="step-count">03/03</span>
                <h2>Final touch.</h2>
                <input type="email" placeholder="email@example.com" required>
                <button type="submit" class="btn-submit">Launch Project</button>
            </div>
        </form>
    </main>

</body>
</html>
